syntax = "proto3";

package nebula.proto;

import "common.proto";

service UserService {
  rpc Register(RegisterRequest) returns (RegisterResponse);
  rpc Login(LoginRequest) returns (LoginResponse);
  rpc ValidateToken(ValidateTokenRequest) returns (ValidateTokenResponse);
  rpc GetUserInfo(GetUserInfoRequest) returns (GetUserInfoResponse);
  rpc GetUserByUsername(GetUserByUsernameRequest) returns (GetUserInfoResponse);
  rpc RefreshToken(RefreshTokenRequest) returns (RefreshTokenResponse);
}

message RegisterRequest {
  string request_id = 1;
  string username = 2;
  string password = 3;
  string nickname = 4;
}

message RegisterResponse {
  CommonResponse response = 1;
  uint64 user_id = 2;
}

message LoginRequest {
  string request_id = 1;
  string username = 2;
  string password = 3;
  string device_id = 4;
  string platform = 5;
  string device_name = 6;
}

message LoginResponse {
  CommonResponse response = 1;
  uint64 user_id = 2;
  string token = 3;
  int64 expire_at = 4;
}

message ResumeSessionRequest {
  string request_id = 1;
  string token = 2;
  string device_id = 3;
  string platform = 4;
  string device_name = 5;
}

message ResumeSessionResponse {
  CommonResponse response = 1;
  uint64 user_id = 2;
}

message ValidateTokenRequest {
  string request_id = 1;
  string token = 2;
}

message ValidateTokenResponse {
  CommonResponse response = 1;
  bool valid = 2;
  uint64 user_id = 3;
}

message GetUserInfoRequest {
  string request_id = 1;
  uint64 user_id = 2;
}

message GetUserByUsernameRequest {
  string request_id = 1;
  string username = 2;
}

message GetUserInfoResponse {
  CommonResponse response = 1;
  UserInfo user = 2;
}

message RefreshTokenRequest {
  string request_id = 1;
  string token = 2;
  string device_id = 3;
}

message RefreshTokenResponse {
  CommonResponse response = 1;
  uint64 user_id = 2;
  string token = 3;
  int64 expire_at = 4;
}
