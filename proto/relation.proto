syntax = "proto3";

package nebula.proto;

import "common.proto";

service RelationService {
  rpc AddFriend(AddFriendRequest) returns (CommonResponse);
  rpc DeleteFriend(DeleteFriendRequest) returns (CommonResponse);
  rpc ListFriends(ListFriendsRequest) returns (ListFriendsResponse);
  rpc SendFriendRequest(SendFriendRequestRequest) returns (SendFriendRequestResponse);
  rpc AcceptFriendRequest(AcceptFriendRequestRequest) returns (CommonResponse);
  rpc RejectFriendRequest(RejectFriendRequestRequest) returns (CommonResponse);
  rpc ListFriendRequests(ListFriendRequestsRequest) returns (ListFriendRequestsResponse);
  rpc CreateGroup(CreateGroupRequest) returns (CreateGroupResponse);
  rpc JoinGroup(JoinGroupRequest) returns (CommonResponse);
  rpc LeaveGroup(LeaveGroupRequest) returns (CommonResponse);
  rpc ListGroupMembers(ListGroupMembersRequest) returns (ListGroupMembersResponse);
  rpc GetGroup(GetGroupRequest) returns (GetGroupResponse);
  rpc ListGroups(ListGroupsRequest) returns (ListGroupsResponse);
  rpc SearchGroups(SearchGroupsRequest) returns (ListGroupsResponse);
}

message AddFriendRequest {
  string request_id = 1;
  uint64 user_id = 2;
  uint64 friend_id = 3;
}

message DeleteFriendRequest {
  string request_id = 1;
  uint64 user_id = 2;
  uint64 friend_id = 3;
}

message ListFriendsRequest {
  string request_id = 1;
  uint64 user_id = 2;
}

message ListFriendsResponse {
  CommonResponse response = 1;
  repeated UserInfo friends = 2;
}

message SendFriendRequestRequest {
  string request_id = 1;
  uint64 from_user_id = 2;
  uint64 to_user_id = 3;
  string message = 4;
}

message SendFriendRequestResponse {
  CommonResponse response = 1;
  uint64 friend_request_id = 2;
}

message AcceptFriendRequestRequest {
  string request_id = 1;
  uint64 user_id = 2;
  uint64 friend_request_id = 3;
}

message RejectFriendRequestRequest {
  string request_id = 1;
  uint64 user_id = 2;
  uint64 friend_request_id = 3;
}

message ListFriendRequestsRequest {
  string request_id = 1;
  uint64 user_id = 2;
  bool incoming = 3;
  int32 status = 4;
  PageRequest page = 5;
}

message FriendRequestInfo {
  uint64 friend_request_id = 1;
  uint64 from_user_id = 2;
  uint64 to_user_id = 3;
  string message = 4;
  int32 status = 5;
  int64 created_at = 6;
  int64 updated_at = 7;
}

message ListFriendRequestsResponse {
  CommonResponse response = 1;
  repeated FriendRequestInfo requests = 2;
  PageResponse page = 3;
}

message CreateGroupRequest {
  string request_id = 1;
  uint64 owner_id = 2;
  string group_name = 3;
}

message CreateGroupResponse {
  CommonResponse response = 1;
  uint64 group_id = 2;
}

message JoinGroupRequest {
  string request_id = 1;
  uint64 user_id = 2;
  uint64 group_id = 3;
}

message LeaveGroupRequest {
  string request_id = 1;
  uint64 user_id = 2;
  uint64 group_id = 3;
}

message ListGroupMembersRequest {
  string request_id = 1;
  uint64 group_id = 2;
  uint64 requester_user_id = 3;
}

message ListGroupMembersResponse {
  CommonResponse response = 1;
  repeated UserInfo members = 2;
}

message GroupInfo {
  uint64 group_id = 1;
  string name = 2;
  uint64 owner_id = 3;
  uint32 member_count = 4;
  int64 created_at = 5;
  int64 updated_at = 6;
}

message GetGroupRequest {
  string request_id = 1;
  uint64 group_id = 2;
}

message GetGroupResponse {
  CommonResponse response = 1;
  GroupInfo group = 2;
}

message ListGroupsRequest {
  string request_id = 1;
  uint64 user_id = 2;
  uint32 limit = 3;
}

message SearchGroupsRequest {
  string request_id = 1;
  string query = 2;
  uint32 limit = 3;
}

message ListGroupsResponse {
  CommonResponse response = 1;
  repeated GroupInfo groups = 2;
}
