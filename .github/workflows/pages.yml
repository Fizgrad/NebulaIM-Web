name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: nebulaim-web-pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

env:
  NODE_VERSION: "22"
  PAGES_BASE_PATH: ${{ vars.PAGES_BASE_PATH || '/NebulaIM-Web/' }}
  VITE_BRIDGE_HTTP_URL: ${{ vars.PAGES_BRIDGE_HTTP_URL }}
  VITE_GATEWAY_WS_URL: ${{ vars.PAGES_GATEWAY_WS_URL }}

jobs:
  build:
    name: Build static site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Validate Pages runtime URLs
        run: |
          set -euo pipefail

          if [ -z "${VITE_BRIDGE_HTTP_URL}" ]; then
            echo "Missing repository variable: PAGES_BRIDGE_HTTP_URL" >&2
            exit 1
          fi
          if [ -z "${VITE_GATEWAY_WS_URL}" ]; then
            echo "Missing repository variable: PAGES_GATEWAY_WS_URL" >&2
            exit 1
          fi
          case "${VITE_BRIDGE_HTTP_URL}" in
            https://*) ;;
            *)
              echo "PAGES_BRIDGE_HTTP_URL must start with https:// for GitHub Pages." >&2
              exit 1
              ;;
          esac
          case "${VITE_GATEWAY_WS_URL}" in
            wss://*) ;;
            *)
              echo "PAGES_GATEWAY_WS_URL must start with wss:// for GitHub Pages." >&2
              exit 1
              ;;
          esac

      - name: Install dependencies
        run: npm ci

      - name: Build frontend for GitHub Pages
        run: npm run build -- --base "${PAGES_BASE_PATH}"

      - name: Add single-page app fallback
        run: |
          set -euo pipefail
          cp dist/index.html dist/404.html
          touch dist/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Publish GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
