name: Deploy NebulaIM Web

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: nebulaim-web-production
  cancel-in-progress: false

permissions:
  contents: read

env:
  NODE_VERSION: "22"
  DEPLOY_HOST: ${{ secrets.DEPLOY_HOST || vars.DEPLOY_HOST }}
  DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || vars.DEPLOY_PORT || '22' }}
  DEPLOY_USER: ${{ secrets.DEPLOY_USER || vars.DEPLOY_USER }}
  DEPLOY_PATH: /opt/nebulaim-web
  DEPLOY_SERVICE: ${{ vars.DEPLOY_SERVICE || 'nebulaim-web-bridge.service' }}

jobs:
  build:
    name: Build release bundle
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            package-lock.json
            bridge/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Build frontend
        run: npm run build

      - name: Install Bridge dependencies
        working-directory: bridge
        run: npm ci

      - name: Audit Bridge production dependencies
        working-directory: bridge
        run: npm audit --omit=dev

      - name: Lint Bridge
        working-directory: bridge
        run: npm run lint

      - name: Build Bridge
        working-directory: bridge
        run: npm run build

      - name: Install browser test runtime
        run: npx playwright install --with-deps chromium

      - name: Run browser tests
        run: npm run test:e2e

      - name: Create release archive
        run: |
          set -euo pipefail

          rm -rf release nebulaim-web-release.tar.gz
          mkdir -p release/web release/bridge/dist release/proto release/deploy

          cp -a dist/. release/web/
          cp -a bridge/dist/. release/bridge/dist/
          cp bridge/package.json bridge/package-lock.json release/bridge/
          cp -a proto/. release/proto/
          cp -a deploy/. release/deploy/
          printf '%s\n' "${GITHUB_SHA}" > release/REVISION

          tar -czf nebulaim-web-release.tar.gz -C release .

      - name: Upload release archive
        uses: actions/upload-artifact@v4
        with:
          name: nebulaim-web-release
          path: nebulaim-web-release.tar.gz
          retention-days: 7

  deploy:
    name: Deploy to production server
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - name: Download release archive
        uses: actions/download-artifact@v4
        with:
          name: nebulaim-web-release

      - name: Configure SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST_KEY: ${{ secrets.DEPLOY_HOST_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${DEPLOY_SSH_KEY}" ]; then
            echo "Missing required secret: DEPLOY_SSH_KEY" >&2
            exit 1
          fi
          if [ -z "${DEPLOY_HOST}" ]; then
            echo "Missing required secret or variable: DEPLOY_HOST" >&2
            exit 1
          fi
          if [ -z "${DEPLOY_USER}" ]; then
            echo "Missing required secret or variable: DEPLOY_USER" >&2
            exit 1
          fi
          if [ -z "${DEPLOY_HOST_KEY}" ]; then
            echo "Missing required secret: DEPLOY_HOST_KEY" >&2
            exit 1
          fi
          case "${DEPLOY_HOST}" in
            *[!A-Za-z0-9.:-]*) echo "DEPLOY_HOST contains invalid characters." >&2; exit 1 ;;
          esac
          case "${DEPLOY_USER}" in
            *[!A-Za-z0-9._-]*) echo "DEPLOY_USER contains invalid characters." >&2; exit 1 ;;
          esac
          case "${DEPLOY_PORT}" in
            ""|*[!0-9]*) echo "DEPLOY_PORT must be a decimal port number." >&2; exit 1 ;;
          esac
          if (( 10#${DEPLOY_PORT} < 1 || 10#${DEPLOY_PORT} > 65535 )); then
            echo "DEPLOY_PORT must be between 1 and 65535." >&2
            exit 1
          fi
          case "${DEPLOY_PATH}" in
            /opt/*) ;;
            *) echo "DEPLOY_PATH must be below /opt." >&2; exit 1 ;;
          esac
          case "${DEPLOY_PATH}" in
            *[!A-Za-z0-9_./-]*) echo "DEPLOY_PATH contains invalid characters." >&2; exit 1 ;;
          esac
          case "${DEPLOY_SERVICE}" in
            ""|*[!A-Za-z0-9_.@-]*) echo "DEPLOY_SERVICE contains invalid characters." >&2; exit 1 ;;
          esac

          install -m 700 -d ~/.ssh
          printf '%s\n' "${DEPLOY_SSH_KEY}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf '%s\n' "${DEPLOY_HOST_KEY}" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Upload release archive
        run: |
          set -euo pipefail

          scp \
            -P "${DEPLOY_PORT}" \
            -i ~/.ssh/deploy_key \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            nebulaim-web-release.tar.gz \
            "${DEPLOY_USER}@${DEPLOY_HOST}:/tmp/nebulaim-web-release-${GITHUB_SHA}.tar.gz"

      - name: Activate release
        run: |
          set -euo pipefail

          ssh \
            -p "${DEPLOY_PORT}" \
            -i ~/.ssh/deploy_key \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "DEPLOY_PATH='${DEPLOY_PATH}' DEPLOY_SERVICE='${DEPLOY_SERVICE}' RELEASE_FILE='/tmp/nebulaim-web-release-${GITHUB_SHA}.tar.gz' bash -s" <<'REMOTE'
          set -euo pipefail

          : "${DEPLOY_PATH:?DEPLOY_PATH is required}"
          : "${DEPLOY_SERVICE:?DEPLOY_SERVICE is required}"
          : "${RELEASE_FILE:?RELEASE_FILE is required}"
          case "${DEPLOY_PATH}" in
            /opt/*) ;;
            *) echo "DEPLOY_PATH must be below /opt." >&2; exit 1 ;;
          esac
          case "${DEPLOY_SERVICE}" in
            *[!A-Za-z0-9_.@-]*) echo "DEPLOY_SERVICE contains invalid characters." >&2; exit 1 ;;
          esac

          if [ "$(id -u)" -eq 0 ]; then
            SUDO=""
          else
            SUDO="sudo"
          fi

          timestamp="$(date +%Y%m%d%H%M%S)"
          stage_dir="${DEPLOY_PATH}/.deploy-${timestamp}"
          tmp_dir="$(mktemp -d /tmp/nebulaim-web.XXXXXX)"
          swap_started="0"
          backed_up_components=""
          installed_components=""

          cleanup_tmp() {
            rm -rf "${tmp_dir}"
            rm -f "${RELEASE_FILE}"
          }

          rollback() {
            if [ "${swap_started}" != "1" ]; then
              ${SUDO} rm -rf "${stage_dir}" >/dev/null 2>&1 || true
              cleanup_tmp
              return
            fi

            echo "Deployment failed after swap. Restoring previous release..." >&2
            ${SUDO} systemctl stop "${DEPLOY_SERVICE}" >/dev/null 2>&1 || true
            for component in web bridge proto deploy; do
              case " ${installed_components} " in
                *" ${component} "*)
                  ${SUDO} rm -rf "${DEPLOY_PATH}/${component}" >/dev/null 2>&1 || true
                  ;;
              esac
              case " ${backed_up_components} " in
                *" ${component} "*)
                  ${SUDO} mv "${DEPLOY_PATH}/${component}.prev" "${DEPLOY_PATH}/${component}" >/dev/null 2>&1 || true
                  ;;
              esac
            done
            ${SUDO} rm -rf "${stage_dir}" >/dev/null 2>&1 || true

            ${SUDO} systemctl restart "${DEPLOY_SERVICE}" >/dev/null 2>&1 || true
            cleanup_tmp
          }

          trap rollback ERR
          trap cleanup_tmp EXIT

          tar -xzf "${RELEASE_FILE}" -C "${tmp_dir}"

          if ! command -v /usr/bin/node >/dev/null 2>&1 || ! command -v /usr/bin/npm >/dev/null 2>&1; then
            echo "System Node.js and npm must be installed at /usr/bin/node and /usr/bin/npm." >&2
            exit 1
          fi
          if ! getent group nebulaim-web >/dev/null 2>&1; then
            ${SUDO} groupadd --system nebulaim-web
          fi
          if ! id nebulaim-web >/dev/null 2>&1; then
            ${SUDO} useradd --system --gid nebulaim-web --home-dir /nonexistent --shell /usr/sbin/nologin nebulaim-web
          fi

          ${SUDO} mkdir -p "${DEPLOY_PATH}" "${stage_dir}/web" "${stage_dir}/bridge" "${stage_dir}/proto" "${stage_dir}/deploy"
          ${SUDO} cp -a "${tmp_dir}/web/." "${stage_dir}/web/"
          ${SUDO} cp -a "${tmp_dir}/bridge/dist" "${stage_dir}/bridge/"
          ${SUDO} cp "${tmp_dir}/bridge/package.json" "${tmp_dir}/bridge/package-lock.json" "${stage_dir}/bridge/"
          ${SUDO} cp -a "${tmp_dir}/proto/." "${stage_dir}/proto/"
          ${SUDO} cp -a "${tmp_dir}/deploy/." "${stage_dir}/deploy/"
          ${SUDO} cp "${tmp_dir}/REVISION" "${stage_dir}/REVISION"

          if [ ! -f "${DEPLOY_PATH}/bridge.env" ]; then
            ${SUDO} cp "${tmp_dir}/deploy/production.env.example" "${DEPLOY_PATH}/bridge.env"
          fi

          env_file="${DEPLOY_PATH}/bridge.env"
          configured_upload_dir="$(${SUDO} awk -F= '/^UPLOAD_DIR=/{sub(/^UPLOAD_DIR=/, ""); print}' "${env_file}" | tail -n 1 || true)"
          upload_dir="${configured_upload_dir:-${DEPLOY_PATH}/uploads}"
          case "${upload_dir}" in
            /*) ;;
            *) upload_dir="${DEPLOY_PATH}/${upload_dir}" ;;
          esac

          ${SUDO} mkdir -p "${upload_dir}/images"
          ${SUDO} chown -R nebulaim-web:nebulaim-web "${upload_dir}"
          if [ -d "${DEPLOY_PATH}/bridge/uploads" ] && [ "${upload_dir}" != "${DEPLOY_PATH}/bridge/uploads" ]; then
            ${SUDO} cp -a "${DEPLOY_PATH}/bridge/uploads/." "${upload_dir}/"
          fi
          if ! ${SUDO} grep -q '^JSON_BODY_LIMIT=' "${env_file}"; then
            printf '\nJSON_BODY_LIMIT=8mb\n' | ${SUDO} tee -a "${env_file}" >/dev/null
          fi
          if ${SUDO} grep -q '^UPLOAD_DIR=' "${env_file}"; then
            ${SUDO} sed -i "s|^UPLOAD_DIR=.*|UPLOAD_DIR=${upload_dir}|" "${env_file}"
          else
            printf 'UPLOAD_DIR=%s\n' "${upload_dir}" | ${SUDO} tee -a "${env_file}" >/dev/null
          fi

          ${SUDO} bash "${tmp_dir}/deploy/setup-minio-media.sh" "${env_file}"
          ${SUDO} chown root:nebulaim-web "${env_file}"
          ${SUDO} chmod 640 "${env_file}"

          ${SUDO} cp "${tmp_dir}/deploy/nebulaim-web-bridge.service" "/etc/systemd/system/${DEPLOY_SERVICE}"
          ${SUDO} systemctl daemon-reload

          cd "${stage_dir}/bridge"
          ${SUDO} /usr/bin/npm ci --omit=dev --no-audit --no-fund
          ${SUDO} chown -R root:nebulaim-web "${stage_dir}"
          ${SUDO} chmod -R g=rX,o= "${stage_dir}"

          swap_started="1"
          for component in web bridge proto deploy; do
            ${SUDO} rm -rf "${DEPLOY_PATH}/${component}.prev"
            if [ -d "${DEPLOY_PATH}/${component}" ]; then
              ${SUDO} mv "${DEPLOY_PATH}/${component}" "${DEPLOY_PATH}/${component}.prev"
              backed_up_components="${backed_up_components} ${component}"
            fi
          done
          for component in web bridge proto deploy; do
            ${SUDO} mv "${stage_dir}/${component}" "${DEPLOY_PATH}/${component}"
            installed_components="${installed_components} ${component}"
          done
          ${SUDO} rm -rf "${stage_dir}"
          ${SUDO} chown root:nebulaim-web "${DEPLOY_PATH}" "${DEPLOY_PATH}/bridge" "${DEPLOY_PATH}/proto" "${DEPLOY_PATH}/deploy" "${DEPLOY_PATH}/web"
          ${SUDO} chmod 750 "${DEPLOY_PATH}" "${DEPLOY_PATH}/bridge" "${DEPLOY_PATH}/proto" "${DEPLOY_PATH}/deploy" "${DEPLOY_PATH}/web"

          ${SUDO} systemctl restart "${DEPLOY_SERVICE}"
          ${SUDO} systemctl is-active --quiet "${DEPLOY_SERVICE}"

          ${SUDO} rm -rf "${DEPLOY_PATH}/web.prev" "${DEPLOY_PATH}/bridge.prev" "${DEPLOY_PATH}/proto.prev" "${DEPLOY_PATH}/deploy.prev"
          swap_started="0"
          REMOTE
