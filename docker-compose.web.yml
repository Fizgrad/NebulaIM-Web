services:
  nebulaim-web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "5173:5173"
    environment:
      - VITE_BRIDGE_WS_URL=ws://localhost:8080/ws
      - VITE_BRIDGE_HTTP_URL=http://localhost:8080

  nebulaim-web-bridge:
    build:
      context: ./bridge
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - BRIDGE_HOST=0.0.0.0
      - BRIDGE_PORT=8080
      - GATEWAY_TCP_HOST=host.docker.internal
      - GATEWAY_TCP_PORT=9000
      - USER_SERVICE_HOST=host.docker.internal
      - USER_SERVICE_PORT=50051
      - RELATION_SERVICE_HOST=host.docker.internal
      - RELATION_SERVICE_PORT=50053
      - ADMIN_SERVICE_HOST=host.docker.internal
      - ADMIN_SERVICE_PORT=50057
      - CORS_ORIGIN=http://localhost:5173
      - PROTO_DIR=/proto
    volumes:
      - ./proto:/proto:ro
